name: Zbuduj mObywatela
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Pobierz kod
        uses: actions/checkout@v4

      - name: Ustaw wersje Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Kompilacja kodu do IPA
        run: |
          mkdir -p build
          xcodebuild -project App.xcodeproj -scheme "App" -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO clean build || xcodebuild -project App/App.xcodeproj -scheme "App" -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO clean build || true
          
          # Szukanie i pakowanie pliku .app do .ipa
          APP_PATH=$(find . -name "*.app" -print -quit)
          if [ -n "$APP_PATH" ]; then
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            zip -r build/mObywatel.ipa Payload
          else
            echo "Nie znaleziono skompilowanej aplikacji!"
            exit 1
          fi

      - name: Wypluj gotowy plik IPA
        uses: actions/upload-artifact@v4
        with:
          name: mObywatel-Gotowy-Plik
          path: build/mObywatel.ipa
