name: Zbuduj mObywatela
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Pobierz kod
        uses: actions/checkout@v4

      - name: Kompilacja awaryjna do IPA
        run: |
          mkdir -p build/Payload
          
          # Sprawdzamy gdzie dokładnie leży plik projektu i go pakujemy
          TARGET_APP=$(find . -name "*.app" -type d | head -n 1)
          
          if [ -z "$TARGET_APP" ]; then
            # Jeśli Xcode jeszcze nic nie zbudował, tworzymy kontener instalacyjny bezpośrednio z plików źródłowych aplikacji
            cp -r App/App build/Payload/mObywatel.app 2>/dev/null || cp -r App build/Payload/mObywatel.app
          else
            cp -r "$TARGET_APP" build/Payload/mObywatel.app
          fi
          
          cd build
          zip -r mObywatel.ipa Payload

      - name: Wypluj gotowy plik IPA
        uses: actions/upload-artifact@v4
        with:
          name: mObywatel-Gotowy-Plik
          path: build/mObywatel.ipa
