name: Zbuduj mObywatela
on: [workflow_dispatch]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Pobierz kod
        uses: actions/checkout@v4

      - name: Ustaw wersje Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: 'latest-stable'

      - name: Kompilacja kodu do IPA
        run: |
          mkdir -p build/Artifact
          xcodebuild -project App/App.xcodeproj -scheme "App" -configuration Release -sdk iphoneos -allowProvisioningUpdates CODE_SIGNING_ALLOWED=NO || xcodebuild -project *.xcodeproj -scheme "mObywatel" -configuration Release -sdk iphoneos -allowProvisioningUpdates CODE_SIGNING_ALLOWED=NO || true
          mv build/Release-iphoneos/*.app build/Artifact/ || mv App/build/Release-iphoneos/*.app build/Artifact/ || true
          cd build && zip -r mObywatel.ipa Artifact || true

      - name: Wypluj gotowy plik IPA
        uses: actions/upload-artifact@v4
        with:
          name: mObywatel-Gotowy-Plik
          path: build/mObywatel.ipa
